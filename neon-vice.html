<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Vice — ocean drive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; font-family: 'Arial Black', 'Segoe UI', sans-serif; }
  #scene { position: fixed; inset: 0; width: 100%; height: 100%;
    filter: saturate(1.3) contrast(1.1); }
  .bar { position: fixed; left: 0; right: 0; height: 7vh; background: #000; z-index: 2; }
  #barTop { top: 0; } #barBot { bottom: 0; }
  #ui { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 20px; z-index: 4; text-align: center; transition: opacity 1s ease;
    background: radial-gradient(ellipse 62% 52% at 50% 50%, rgba(5,2,14,0.82) 0%, rgba(5,2,14,0.5) 55%, rgba(5,2,14,0) 78%); }
  #title {
    font-size: clamp(40px, 9vw, 100px); font-style: italic; letter-spacing: 0.04em;
    background: linear-gradient(180deg, #ffffff 0%, #ffd1ec 30%, #ff2e88 55%, #6ef3ff 58%, #ffffff 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 24px rgba(255,46,136,0.6)) drop-shadow(0 4px 0 rgba(20,0,40,0.9));
    text-transform: uppercase;
  }
  #subtitle { font-family: 'Courier New', monospace; font-size: clamp(12px, 2vw, 16px);
    color: #ffb45e; letter-spacing: 0.5em; text-transform: uppercase;
    text-shadow: 0 0 14px rgba(255,180,94,0.9); }
  #playBtn {
    cursor: pointer; margin-top: 12px; font-family: 'Courier New', monospace; font-weight: bold;
    font-size: 17px; letter-spacing: 0.35em; text-transform: uppercase; color: #fff;
    padding: 15px 48px; border: 2px solid #ff2e88; border-radius: 4px;
    background: rgba(255,46,136,0.12); text-shadow: 0 0 12px rgba(255,46,136,1);
    box-shadow: 0 0 28px rgba(255,46,136,0.45), inset 0 0 20px rgba(255,46,136,0.15);
    transition: all .25s ease;
  }
  #playBtn:hover { box-shadow: 0 0 50px rgba(255,46,136,0.8), inset 0 0 30px rgba(255,46,136,0.3); transform: scale(1.04); }
  #hint { font-family: 'Courier New', monospace; font-size: 11px; color: #7d6fa8;
    letter-spacing: 0.3em; text-transform: uppercase; }
  #hud { position: fixed; left: 0; right: 0; bottom: 8.2vh; display: flex; flex-direction: column;
    align-items: center; gap: 8px; z-index: 3; opacity: 0; transition: opacity 1.4s ease; pointer-events: none; }
  #section { font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 0.6em;
    text-transform: uppercase; color: #ffb45e; text-shadow: 0 0 10px rgba(255,180,94,0.9);
    background: rgba(6,3,18,0.5); padding: 3px 14px 3px 20px; border-radius: 4px;
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
  #pb { width: min(360px, 60vw); height: 3px; background: rgba(255,46,136,0.18); border-radius: 3px; overflow: hidden; }
  #pbFill { height: 100%; width: 0%; background: linear-gradient(90deg, #ff2e88, #ffb45e); box-shadow: 0 0 8px rgba(255,46,136,0.9); }
  body.playing #ui { opacity: 0; pointer-events: none; }
  body.playing #hud { opacity: 1; }
  #pauseHit { position: fixed; inset: 0; display: none; z-index: 1; }
  body.playing #pauseHit { display: block; }
  #nav { position: fixed; top: 8.2vh; right: 20px; z-index: 5; display: flex; gap: 10px; }
  #nav a { font-family: 'Courier New', monospace; color: #7d6fa8; text-decoration: none;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; padding: 7px 12px;
    border: 1px solid rgba(125,111,168,0.4); border-radius: 3px; background: rgba(0,0,0,0.5);
    transition: all .25s ease; }
  #nav a:hover { color: #ff2e88; border-color: #ff2e88; text-shadow: 0 0 8px rgba(255,46,136,0.8); }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="bar" id="barTop"></div>
<div class="bar" id="barBot"></div>
<div id="pauseHit"></div>
<div id="nav">
  <a href="neon-horizon.html">&#9666; neon horizon</a>
  <a href="afterglow.html">afterglow &#9656;</a>
</div>
<div id="ui">
  <div id="title">Neon Vice</div>
  <div id="subtitle">ocean drive &middot; no brakes</div>
  <div id="playBtn">&#9658; Floor It</div>
  <div id="hint">tap anywhere to pause &middot; space toggles</div>
</div>
<div id="hud">
  <div id="section">idle</div>
  <div id="pb"><div id="pbFill"></div></div>
</div>

<script>
/* =====================================================================
   NEON VICE — adrenaline synthwave that builds to a climax, over a
   cinematic Miami coastal drive. 124 BPM · Cm Ab Eb Bb · 48 bars (~93 s)
   Sections: tension → drop → anthem → build → CLIMAX → victory → loop
   ===================================================================== */

const BPM = 124, SPB = 60 / BPM, LOOP_BARS = 48, LOOP_BEATS = LOOP_BARS * 4;
const LOOP_SECONDS = LOOP_BEATS * SPB;
const mtof = m => 440 * Math.pow(2, (m - 69) / 12);

/* ------------------------- THE SCORE ------------------------------ */
// 4-bar cycle: Cm | Ab | Eb | Bb
const PROG = [
  { root: 36, pad: [60, 63, 67], stab: [48, 55, 60] },
  { root: 32, pad: [60, 63, 68], stab: [44, 51, 56] },
  { root: 39, pad: [58, 63, 67], stab: [51, 58, 63] },
  { root: 34, pad: [58, 62, 65], stab: [46, 53, 58] },
];

// THE RIFF — relentless syncopated unison stabs (t, semitone offset, dur, vel)
const RIFF = [
  { t: 0,    o: 0,  d: .45, v: 1.0 },
  { t: 0.75, o: 0,  d: .2,  v: .65 },
  { t: 1.5,  o: 0,  d: .4,  v: .85 },
  { t: 2.25, o: 0,  d: .2,  v: .55 },
  { t: 3.0,  o: -2, d: .4,  v: .8 },
  { t: 3.5,  o: 0,  d: .45, v: .9 },
];

// anthem melody, mid register (32 beats over Cm Ab Eb Bb ×2)
const MEL_A = [
  { t: 0, n: 67, d: .75 }, { t: .75, n: 72, d: .75 }, { t: 1.5, n: 75, d: 1.5 }, { t: 3, n: 74, d: .5 }, { t: 3.5, n: 72, d: .5 },
  { t: 4, n: 72, d: 1.5 }, { t: 5.5, n: 75, d: .5 }, { t: 6, n: 77, d: 1 }, { t: 7, n: 75, d: 1 },
  { t: 8, n: 79, d: 1.5 }, { t: 9.5, n: 77, d: .5 }, { t: 10, n: 75, d: 1 }, { t: 11, n: 70, d: 1 },
  { t: 12, n: 74, d: 1.5 }, { t: 13.5, n: 77, d: .5 }, { t: 14, n: 74, d: 1 }, { t: 15, n: 72, d: 1 },
  { t: 16, n: 67, d: .75 }, { t: 16.75, n: 72, d: .75 }, { t: 17.5, n: 75, d: 1.5 }, { t: 19, n: 77, d: 1 },
  { t: 20, n: 68, d: 1 }, { t: 21, n: 72, d: 1 }, { t: 22, n: 75, d: 2 },
  { t: 24, n: 70, d: 1 }, { t: 25, n: 75, d: 1 }, { t: 26, n: 79, d: 2 },
  { t: 28, n: 77, d: 1.5 }, { t: 29.5, n: 74, d: .5 }, { t: 30, n: 70, d: 1 }, { t: 31, n: 72, d: 1 },
];
// CLIMAX melody — octave up, soaring
const MEL_X = [
  { t: 0, n: 84, d: 1.5 }, { t: 1.5, n: 82, d: .5 }, { t: 2, n: 79, d: 2 },
  { t: 4, n: 80, d: 1.5 }, { t: 5.5, n: 82, d: .5 }, { t: 6, n: 84, d: 2 },
  { t: 8, n: 82, d: 1.5 }, { t: 9.5, n: 79, d: .5 }, { t: 10, n: 75, d: 1 }, { t: 11, n: 77, d: 1 },
  { t: 12, n: 86, d: 1.5 }, { t: 13.5, n: 84, d: .5 }, { t: 14, n: 82, d: 2 },
  { t: 16, n: 79, d: .75 }, { t: 16.75, n: 84, d: .75 }, { t: 17.5, n: 87, d: 1.5 }, { t: 19, n: 86, d: 1 },
  { t: 20, n: 84, d: 1.5 }, { t: 21.5, n: 80, d: .5 }, { t: 22, n: 82, d: 2 },
  { t: 24, n: 79, d: .75 }, { t: 24.75, n: 82, d: .75 }, { t: 25.5, n: 87, d: 1.5 }, { t: 27, n: 86, d: 1 },
  { t: 28, n: 77, d: .5 }, { t: 28.5, n: 79, d: .5 }, { t: 29, n: 81, d: .5 }, { t: 29.5, n: 82, d: .5 }, { t: 30, n: 84, d: 2 },
];
const HARM = { 84: 80, 82: 79, 79: 75, 80: 77, 75: 72, 77: 74, 86: 82, 87: 84, 81: 77, 70: 67, 74: 70 };

function buildScore() {
  const ev = [];
  const push = (t, type, o) => ev.push(Object.assign({ t, type }, o));

  for (let bar = 0; bar < LOOP_BARS; bar++) {
    const t0 = bar * 4;
    const ch = PROG[bar % 4];
    const sec = Math.floor(bar / 8);   // 0 tension 1 ignition 2 anthem 3 build 4 CLIMAX 5 victory
    const r = ch.root;

    /* --- pads (pumping) --- */
    const padV = [.07, .1, .11, .12, .14, .11][sec];
    push(t0, 'pad', { ns: ch.pad, d: 4.1, v: padV });

    /* --- 16th arp, filter opens as energy climbs --- */
    const cutBySec = [700, 1600, 2300, 0, 5200, 2400];
    let cut = cutBySec[sec];
    if (sec === 3) cut = 1800 + (bar - 24) / 8 * 4200;     // sweep open through the build
    const seq = [r + 24, r + 31, r + 36, r + 31];
    for (let s = 0; s < 16; s++) {
      const v = (s % 4 === 0 ? .3 : .18) * (sec === 0 ? .8 : 1);
      push(t0 + s * 0.25, 'pluck', { n: seq[s % 4], v, c: cut });
    }

    /* --- THE RIFF --- */
    if (sec === 1 || sec === 2 || sec === 4 || sec === 5) {
      const rv = sec === 4 ? 1.0 : sec === 5 ? .8 : .9;
      for (const h of RIFF) push(t0 + h.t, 'stab', { ns: ch.stab.map(n => n + h.o), d: h.d, v: h.v * rv });
    } else if (sec === 0 && bar >= 4) {
      for (const h of RIFF) push(t0 + h.t, 'stab', { ns: ch.stab.map(n => n + h.o), d: h.d, v: h.v * .3, dark: 1 });
    } else if (sec === 3 && bar < 28) {
      // breakdown keeps the riff growling underneath so intensity never stalls
      for (const h of RIFF) push(t0 + h.t, 'stab', { ns: ch.stab.map(n => n + h.o), d: h.d, v: h.v * .5, dark: 1 });
    }

    /* --- bass --- */
    if (sec === 1 || sec === 2 || sec === 5) {
      for (let s = 0; s < 8; s++) {
        const oct = s === 3 || s === 7;
        push(t0 + s * .5, 'bass', { n: oct ? r + 12 : r, d: .42, v: s % 2 ? .52 : .44 });
      }
    } else if (sec === 4) {
      // galloping 16ths — full pump
      for (let b = 0; b < 4; b++) {
        push(t0 + b, 'bass', { n: r, d: .4, v: .55 });
        push(t0 + b + .5, 'bass', { n: r, d: .2, v: .42 });
        push(t0 + b + .75, 'bass', { n: r + 12, d: .2, v: .46 });
      }
    } else if (sec === 3) {
      if (bar < 30) {
        for (let s = 0; s < 8; s++) push(t0 + s * .5, 'bass', { n: r, d: .42, v: .48 + (bar - 24) * .015 });
      } else if (bar === 30) {
        [43, 43, 44, 44, 46, 46, 48, 48].forEach((n, i) => push(t0 + i * .5, 'bass', { n, d: .42, v: .5 }));
      } else {
        [50, 50, 51, 51, 53, 53, 55, 55].forEach((n, i) => { if (t0 + i * .5 < t0 + 3.5) push(t0 + i * .5, 'bass', { n, d: .4, v: .55 }); });
      }
    } else if (sec === 0) {
      push(t0, 'bass', { n: r, d: 3.8, v: .3 });
    }

    /* --- drums --- */
    if (sec === 1 || sec === 2 || sec === 4 || sec === 5) {
      for (let k = 0; k < 4; k++) push(t0 + k, 'kick', { v: k === 0 ? 1 : .9 });
      push(t0 + 1, 'gsnare', { v: .85 }); push(t0 + 3, 'gsnare', { v: .85 });
      push(t0 + 1, 'clap', { v: .5 }); push(t0 + 3, 'clap', { v: .5 });
      const hstep = sec === 1 ? .5 : .25;
      for (let h = hstep; h < 4; h += hstep)
        if (h % 1 !== 0) push(t0 + h, 'hat', { v: h % .5 === 0 ? .2 : .1 });
      if (sec === 4) for (let k = 0; k < 4; k++) push(t0 + k + .5, 'ohat', { v: .3 });
      if (sec === 4 && bar % 2 === 1) push(t0 + 3.75, 'kick', { v: .6 });
      if ((bar === 15 || bar === 23) ) [3, 3.25, 3.5, 3.75].forEach((tt, i) =>
        push(t0 + tt, 'tom', { f: [220, 180, 150, 120][i], v: .6 }));
    } else if (sec === 0) {
      push(t0, 'kick', { v: .55 }); push(t0 + 2, 'kick', { v: .45 });
      if (bar === 7) { push(t0 + 1, 'clap', { v: .4 }); push(t0 + 3, 'clap', { v: .5 }); }
    } else if (sec === 3) {
      if (bar < 30) { for (let k = 0; k < 4; k++) push(t0 + k, 'kick', { v: .8 }); }
      // keep the engine running through the breakdown — never dip below ignition energy
      for (let h = .5; h < 4; h += .5) push(t0 + h, 'hat', { v: h % 1 ? .16 : .22 });
      push(t0 + 1, 'clap', { v: .4 }); push(t0 + 3, 'clap', { v: .45 });
      if (bar < 28) for (let k = 0; k < 4; k++) push(t0 + k + .5, 'ohat', { v: .28 });
      // the accelerating roll
      const steps = bar < 26 ? 4 : bar < 28 ? 8 : bar < 30 ? 8 : 16;
      for (let s2 = 0; s2 < steps; s2++) {
        const tt = s2 * 4 / steps;
        if (bar === 31 && tt >= 3.5) continue;          // the gasp before the drop
        push(t0 + tt, 'gsnare', { v: .25 + (bar - 24) / 8 * .5 + tt / 4 * .1 });
      }
    }

    /* --- melodies --- */
    if (bar % 8 === 0) {
      if (sec === 2) for (const e of MEL_A) push(t0 + e.t, 'lead', { n: e.n, d: e.d, v: .75 });
      if (sec === 4) for (const e of MEL_X) {
        push(t0 + e.t, 'lead', { n: e.n, d: e.d, v: .95 });
        const h = HARM[e.n];
        if (h && e.d >= 1) push(t0 + e.t, 'lead', { n: h, d: e.d, v: .4 });
      }
      if (sec === 5 && bar === 40) { push(t0, 'lead', { n: 84, d: 3, v: .55 }); push(t0 + 4, 'lead', { n: 82, d: 3, v: .5 }); }
    }

    /* --- transitions --- */
    if (bar === 6) push(t0, 'riser', { d: 8, v: .1 });
    if (bar === 14) push(t0, 'riser', { d: 8, v: .1 });
    if (bar === 22) push(t0, 'riser', { d: 8, v: .12 });
    if (bar === 24) push(t0, 'riser', { d: 8, v: .08 });
    if (bar === 28) push(t0, 'riser', { d: 16, v: .17 });
    if (bar === 8 || bar === 32) push(t0, 'subdrop', { v: bar === 32 ? 1 : .7 });
    if (bar === 8 || bar === 16 || bar === 32 || bar === 40) push(t0, 'crash', { v: bar === 32 ? .5 : .35 });
  }

  ev.sort((a, b2) => a.t - b2.t);
  return ev;
}

const SCORE = buildScore();
const SECTION_NAMES = ['tension', 'ignition', 'anthem', 'the build', 'C L I M A X', 'victory lap'];

/* ----------------------- AUDIO ENGINE ----------------------------- */
let ctx = null, master, comp, drive, reverb, reverbGain, echo;
let playing = false, startTime = 0, nextIdx = 0, loopOffset = 0, loopsDone = 0;
let schedTimer = null;
const visualQueue = [];

function makeImpulse(c, seconds, decay) {
  const rate = c.sampleRate, len = rate * seconds;
  const buf = c.createBuffer(2, len, rate);
  for (let chn = 0; chn < 2; chn++) {
    const d = buf.getChannelData(chn);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
  }
  return buf;
}

function initAudio() {
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -12; comp.knee.value = 14; comp.ratio.value = 6; comp.attack.value = 0.002;
  // gentle tanh drive for glue and aggression
  drive = ctx.createWaveShaper();
  const curve = new Float32Array(1024);
  for (let i = 0; i < 1024; i++) { const x = i / 511.5 - 1; curve[i] = Math.tanh(1.6 * x); }
  drive.curve = curve; drive.oversample = '2x';
  master = ctx.createGain(); master.gain.value = 0.7;
  master.connect(drive); drive.connect(comp); comp.connect(ctx.destination);

  reverb = ctx.createConvolver(); reverb.buffer = makeImpulse(ctx, 2.0, 2.8);
  reverbGain = ctx.createGain(); reverbGain.gain.value = 0.3;
  reverb.connect(reverbGain); reverbGain.connect(master);

  echo = ctx.createDelay(2); echo.delayTime.value = SPB * 0.75;
  const fb = ctx.createGain(); fb.gain.value = 0.3;
  const wet = ctx.createGain(); wet.gain.value = 0.2;
  echo.connect(fb); fb.connect(echo);
  echo.connect(wet); wet.connect(master);
}

function send(node, dry, wet) {
  const g1 = ctx.createGain(); g1.gain.value = dry; node.connect(g1); g1.connect(master);
  const g2 = ctx.createGain(); g2.gain.value = wet; node.connect(g2); g2.connect(reverb);
}

function pad(when, midis, durBeats, vel) {
  const len = durBeats * SPB;
  const bus = ctx.createGain();
  bus.gain.setValueAtTime(0, when);
  bus.gain.linearRampToValueAtTime(1, when + 0.35);
  bus.gain.setValueAtTime(1, when + len - 0.2);
  bus.gain.linearRampToValueAtTime(0, when + len + 0.25);
  const pump = ctx.createGain(); pump.gain.value = 0.68;
  const lfo = ctx.createOscillator(); lfo.type = 'sawtooth'; lfo.frequency.value = 1 / SPB;
  const lg = ctx.createGain(); lg.gain.value = 0.3;
  lfo.connect(lg); lg.connect(pump.gain);
  bus.connect(pump); send(pump, 0.5, 0.5);
  lfo.start(when); lfo.stop(when + len + 0.3);
  for (const m of midis) {
    const f = mtof(m);
    for (const det of [-8, 8]) {
      const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f; o.detune.value = det;
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1200;
      const g = ctx.createGain(); g.gain.value = vel / midis.length;
      o.connect(lp); lp.connect(g); g.connect(bus);
      o.start(when); o.stop(when + len + 0.3);
    }
  }
}

/* power stab — the riff voice */
function stab(when, midis, durBeats, vel, dark) {
  const len = Math.max(0.12, durBeats * SPB);
  const out = ctx.createGain();
  out.gain.setValueAtTime(0, when);
  out.gain.linearRampToValueAtTime(vel * 0.34, when + 0.006);
  out.gain.setValueAtTime(vel * 0.3, when + len * 0.5);
  out.gain.exponentialRampToValueAtTime(0.001, when + len + 0.08);
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.value = dark ? 900 : 3200; lp.Q.value = 1;
  lp.connect(out); send(out, 0.8, 0.22);
  for (const m of midis) {
    const f = mtof(m);
    for (const det of [-10, 10]) {
      const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f; o.detune.value = det;
      const g = ctx.createGain(); g.gain.value = 1 / (midis.length * 1.4);
      o.connect(g); g.connect(lp);
      o.start(when); o.stop(when + len + 0.15);
    }
  }
  // sub punch an octave below the root
  const s = ctx.createOscillator(); s.type = 'square'; s.frequency.value = mtof(midis[0] - 12);
  const sg = ctx.createGain(); sg.gain.value = 0.16;
  s.connect(sg); sg.connect(lp);
  s.start(when); s.stop(when + len + 0.15);
}

function bass(when, midi, durBeats, vel) {
  const f = mtof(midi);
  const len = durBeats * SPB;
  const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f;
  const o2 = ctx.createOscillator(); o2.type = 'square'; o2.frequency.value = f;
  const g2 = ctx.createGain(); g2.gain.value = 0.4; o2.connect(g2);
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 3;
  lp.frequency.setValueAtTime(950, when);
  lp.frequency.exponentialRampToValueAtTime(230, when + Math.min(0.22, len));
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(vel, when + 0.007);
  g.gain.setValueAtTime(vel * 0.7, when + len * 0.7);
  g.gain.linearRampToValueAtTime(0, when + len);
  o.connect(lp); g2.connect(lp); lp.connect(g); send(g, 1, 0.02);
  o.start(when); o.stop(when + len + 0.05);
  o2.start(when); o2.stop(when + len + 0.05);
}

function pluck(when, midi, vel, cutoff) {
  const f = mtof(midi);
  const o = ctx.createOscillator(); o.type = 'square'; o.frequency.value = f;
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = cutoff || 2400; lp.Q.value = 2;
  const g = ctx.createGain();
  g.gain.setValueAtTime(vel * 0.26, when);
  g.gain.exponentialRampToValueAtTime(0.0001, when + 0.15);
  o.connect(lp); lp.connect(g); send(g, 0.7, 0.2);
  o.start(when); o.stop(when + 0.18);
}

function lead(when, midi, durBeats, vel) {
  const f = mtof(midi);
  const len = durBeats * SPB;
  const out = ctx.createGain();
  out.gain.setValueAtTime(0, when);
  out.gain.linearRampToValueAtTime(vel * 0.27, when + 0.02);
  out.gain.setValueAtTime(vel * 0.24, when + Math.max(0.05, len - 0.07));
  out.gain.linearRampToValueAtTime(0, when + len + 0.05);
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 3800; lp.Q.value = 0.7;
  lp.connect(out);
  const lfo = ctx.createOscillator(); lfo.frequency.value = 5.6;
  const lg = ctx.createGain();
  lg.gain.setValueAtTime(0, when);
  lg.gain.setValueAtTime(0, when + 0.16);
  lg.gain.linearRampToValueAtTime(12, when + 0.4);
  lfo.connect(lg);
  for (const det of [-10, 0, 10]) {
    const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f; o.detune.value = det;
    lg.connect(o.detune); o.connect(lp);
    o.start(when); o.stop(when + len + 0.1);
  }
  lfo.start(when); lfo.stop(when + len + 0.1);
  send(out, 0.55, 0.25); out.connect(echo);
}

function kick(when, vel) {
  const o = ctx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(150, when);
  o.frequency.exponentialRampToValueAtTime(44, when + 0.09);
  const g = ctx.createGain();
  g.gain.setValueAtTime(vel, when);
  g.gain.exponentialRampToValueAtTime(0.0001, when + 0.24);
  o.connect(g); send(g, 1, 0.03);
  o.start(when); o.stop(when + 0.28);
  // click transient
  const len = ctx.sampleRate * 0.006;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const c = ctx.createBufferSource(); c.buffer = buf;
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 3000;
  const cg = ctx.createGain(); cg.gain.value = vel * 0.4;
  c.connect(hp); hp.connect(cg); send(cg, 1, 0);
  c.start(when);
}

function gsnare(when, vel) {
  const len = ctx.sampleRate * 0.24;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.1);
  const s = ctx.createBufferSource(); s.buffer = buf;
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1500; bp.Q.value = 0.6;
  const g = ctx.createGain();
  g.gain.setValueAtTime(vel, when);
  g.gain.setValueAtTime(vel * 0.85, when + 0.1);
  g.gain.linearRampToValueAtTime(0, when + 0.13);
  s.connect(bp); bp.connect(g); send(g, 0.55, 0.8);
  const t = ctx.createOscillator(); t.type = 'triangle'; t.frequency.value = 195;
  const tg = ctx.createGain();
  tg.gain.setValueAtTime(vel * 0.5, when);
  tg.gain.exponentialRampToValueAtTime(0.0001, when + 0.08);
  t.connect(tg); send(tg, 0.8, 0.15);
  s.start(when); t.start(when); t.stop(when + 0.1);
}

function clap(when, vel) {
  for (let i = 0; i < 3; i++) {
    const len = ctx.sampleRate * 0.05;
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let j = 0; j < len; j++) d[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / len, 2);
    const s = ctx.createBufferSource(); s.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1100; bp.Q.value = 1.4;
    const g = ctx.createGain(); g.gain.value = vel * (i === 2 ? 1 : 0.55);
    s.connect(bp); bp.connect(g); send(g, 0.5, 0.6);
    s.start(when + i * 0.011);
  }
}

function hat(when, vel) {
  const len = ctx.sampleRate * 0.04;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 5);
  const s = ctx.createBufferSource(); s.buffer = buf;
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 9000;
  const g = ctx.createGain(); g.gain.value = vel;
  s.connect(hp); hp.connect(g); send(g, 0.8, 0.1);
  s.start(when);
}

function ohat(when, vel) {
  const len = ctx.sampleRate * 0.22;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
  const s = ctx.createBufferSource(); s.buffer = buf;
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 7000;
  const g = ctx.createGain(); g.gain.value = vel;
  s.connect(hp); hp.connect(g); send(g, 0.7, 0.2);
  s.start(when);
}

function tom(when, f, vel) {
  const o = ctx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(f, when);
  o.frequency.exponentialRampToValueAtTime(f * 0.55, when + 0.18);
  const g = ctx.createGain();
  g.gain.setValueAtTime(vel, when);
  g.gain.exponentialRampToValueAtTime(0.0001, when + 0.25);
  o.connect(g); send(g, 0.9, 0.25);
  o.start(when); o.stop(when + 0.3);
}

function subdrop(when, vel) {
  const o = ctx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(75, when);
  o.frequency.exponentialRampToValueAtTime(27, when + 0.7);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(vel * 0.8, when + 0.03);
  g.gain.exponentialRampToValueAtTime(0.0001, when + 1.1);
  o.connect(g); send(g, 1, 0.05);
  o.start(when); o.stop(when + 1.2);
}

function crash(when, vel) {
  const len = ctx.sampleRate * 1.4;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.4);
  const s = ctx.createBufferSource(); s.buffer = buf;
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 5200;
  const g = ctx.createGain(); g.gain.value = vel;
  s.connect(hp); hp.connect(g); send(g, 0.5, 0.6);
  s.start(when);
}

function riser(when, durBeats, vel) {
  const len = durBeats * SPB;
  const n = ctx.createBufferSource();
  const buf = ctx.createBuffer(1, ctx.sampleRate * len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  n.buffer = buf;
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.2;
  bp.frequency.setValueAtTime(250, when);
  bp.frequency.exponentialRampToValueAtTime(5200, when + len);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.001, when);
  g.gain.exponentialRampToValueAtTime(vel, when + len);
  g.gain.linearRampToValueAtTime(0, when + len + 0.05);
  n.connect(bp); bp.connect(g); send(g, 0.5, 0.6);
  n.start(when);
  // sine gliss underneath
  const o = ctx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(mtof(48), when);
  o.frequency.exponentialRampToValueAtTime(mtof(72), when + len);
  const og = ctx.createGain();
  og.gain.setValueAtTime(0.0001, when);
  og.gain.exponentialRampToValueAtTime(vel * 0.5, when + len);
  og.gain.linearRampToValueAtTime(0, when + len + 0.05);
  o.connect(og); send(og, 0.4, 0.5);
  o.start(when); o.stop(when + len + 0.1);
}

function scheduler() {
  const horizon = ctx.currentTime + 0.18;
  while (true) {
    const evt = SCORE[nextIdx];
    const when = startTime + loopOffset + evt.t * SPB;
    if (when > horizon) break;
    if (when >= ctx.currentTime - 0.05) fire(evt, when);
    nextIdx++;
    if (nextIdx >= SCORE.length) { nextIdx = 0; loopOffset += LOOP_SECONDS; loopsDone++; }
  }
}

function fire(e, when) {
  switch (e.type) {
    case 'pad':     pad(when, e.ns, e.d, e.v); break;
    case 'pluck':   pluck(when, e.n, e.v, e.c); break;
    case 'stab':    stab(when, e.ns, e.d, e.v, e.dark); visualQueue.push({ when, kind: 'stab' }); break;
    case 'bass':    bass(when, e.n, e.d, e.v); break;
    case 'lead':    lead(when, e.n, e.d, e.v); break;
    case 'kick':    kick(when, e.v); visualQueue.push({ when, kind: 'kick' }); break;
    case 'gsnare':  gsnare(when, e.v); break;
    case 'clap':    clap(when, e.v); break;
    case 'hat':     hat(when, e.v); break;
    case 'ohat':    ohat(when, e.v); break;
    case 'tom':     tom(when, e.f, e.v); break;
    case 'subdrop': subdrop(when, e.v); visualQueue.push({ when, kind: 'drop' }); break;
    case 'crash':   crash(when, e.v); break;
    case 'riser':   riser(when, e.d, e.v); break;
  }
}

/* iOS mutes Web Audio when the ring/silent switch is on silent; playing a
   real media element promotes the audio session to 'playback', which is exempt. */
let unmuteEl = null;
function iosUnmute() {
  try { if (navigator.audioSession) navigator.audioSession.type = 'playback'; } catch (e) {}
  if (!unmuteEl) {
    const rate = 8000, n = rate / 2, len = 44 + n, b = new DataView(new ArrayBuffer(len));
    const ws = (o, s) => { for (let i = 0; i < s.length; i++) b.setUint8(o + i, s.charCodeAt(i)); };
    ws(0, 'RIFF'); b.setUint32(4, len - 8, true); ws(8, 'WAVE'); ws(12, 'fmt ');
    b.setUint32(16, 16, true); b.setUint16(20, 1, true); b.setUint16(22, 1, true);
    b.setUint32(24, rate, true); b.setUint32(28, rate, true); b.setUint16(32, 1, true); b.setUint16(34, 8, true);
    ws(36, 'data'); b.setUint32(40, n, true);
    for (let i = 0; i < n; i++) b.setUint8(44 + i, 128);
    unmuteEl = document.createElement('audio');
    unmuteEl.src = URL.createObjectURL(new Blob([b.buffer], { type: 'audio/wav' }));
    unmuteEl.setAttribute('playsinline', '');
    unmuteEl.loop = true;
  }
  unmuteEl.play().catch(() => {});
}

function play() {
  if (!ctx) initAudio();
  iosUnmute();
  ctx.resume();
  playing = true;
  startTime = ctx.currentTime + 0.1;
  nextIdx = 0; loopOffset = 0; loopsDone = 0;
  schedTimer = setInterval(scheduler, 30);
  document.body.classList.add('playing');
}
function stop() {
  playing = false;
  clearInterval(schedTimer);
  if (ctx) ctx.suspend();
  if (unmuteEl) unmuteEl.pause();
  document.body.classList.remove('playing');
}
document.getElementById('playBtn').addEventListener('click', e => { e.stopPropagation(); play(); });
document.getElementById('pauseHit').addEventListener('click', () => stop());
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); playing ? stop() : play(); }
});

/* debug/iteration hooks */
window.__seek = beats => {
  if (!playing) play();
  const b = ((beats % LOOP_BEATS) + LOOP_BEATS) % LOOP_BEATS;
  startTime = ctx.currentTime - b * SPB;
  loopOffset = 0;
  nextIdx = SCORE.findIndex(ev => ev.t >= b);
  // past the last event: resume from the top of the NEXT loop, not replay the whole score
  if (nextIdx < 0) { nextIdx = 0; loopOffset = LOOP_SECONDS; }
};
window.__info = () => {
  const beat = (playing && ctx)
    ? ((((ctx.currentTime - startTime) / SPB) % LOOP_BEATS) + LOOP_BEATS) % LOOP_BEATS
    : 0;
  const bar = Math.floor(beat / 4);
  return { playing, state: ctx && ctx.state,
           beat: Math.round(beat * 100) / 100, bar,
           section: playing ? SECTION_NAMES[Math.min(5, Math.floor(bar / 8))] : 'idle',
           t: ctx && ctx.currentTime, loops: loopsDone };
};

/* ------------------- VISUALS: OCEAN DRIVE -------------------------- */
const cv = document.getElementById('scene');
const g = cv.getContext('2d');
let W, H, HY;
function resize() {
  W = cv.width = innerWidth * devicePixelRatio;
  H = cv.height = innerHeight * devicePixelRatio;
  HY = H * 0.46;
}
addEventListener('resize', resize); resize();

const FOCAL = () => H * 0.78;
const Z_FAR = 42;

/* time-of-day palette keyframes across the loop (frac 0..1, wraps) */
const PAL = [
  { f: 0.00, top: [26, 17, 64],  mid: [110, 42, 114], hor: [255, 140, 66], sun: .27, night: 0 },
  { f: 0.28, top: [18, 10, 48],  mid: [74, 22, 96],   hor: [224, 68, 122], sun: .1,  night: .35 },
  { f: 0.50, top: [5, 4, 15],    mid: [20, 11, 44],   hor: [52, 28, 78],   sun: -.2, night: 1 },
  { f: 0.80, top: [6, 5, 18],    mid: [24, 13, 50],   hor: [70, 34, 92],   sun: -.15,night: .95 },
  // victory lap keeps a neon afterglow (dim roof edges + lit windows) through bar ~45 …
  { f: 0.955,top: [12, 8, 34],   mid: [50, 23, 78],   hor: [138, 66, 102], sun: -.05,night: .72 },
  // … and only completes the wrap to sunrise in the last ~2 bars for the seamless loop
  { f: 1.00, top: [26, 17, 64],  mid: [110, 42, 114], hor: [255, 140, 66], sun: .27, night: 0 },
];
function palette(frac) {
  let a = PAL[0], b = PAL[PAL.length - 1];
  for (let i = 0; i < PAL.length - 1; i++)
    if (frac >= PAL[i].f && frac <= PAL[i + 1].f) { a = PAL[i]; b = PAL[i + 1]; break; }
  const span = b.f - a.f || 1;
  let k = (frac - a.f) / span;
  k = k * k * (3 - 2 * k);
  const mix = (x, y) => x + (y - x) * k;
  const mc = (x, y) => [mix(x[0], y[0]), mix(x[1], y[1]), mix(x[2], y[2])].map(Math.round);
  return { top: mc(a.top, b.top), mid: mc(a.mid, b.mid), hor: mc(a.hor, b.hor),
           sun: mix(a.sun, b.sun), night: mix(a.night, b.night) };
}
const rgb = c => `rgb(${c[0]},${c[1]},${c[2]})`;
const rgba = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a})`;

/* skyline silhouettes (two parallax strips), generated once */
function makeSkyline(seed, minH, maxH) {
  const bs = []; let x = 0;
  let s = seed;
  const rnd = () => { s = (s * 16807) % 2147483647; return s / 2147483647; };
  while (x < 2.2) {
    const w = 0.018 + rnd() * 0.05;
    bs.push({ x, w, h: minH + rnd() * (maxH - minH), win: Math.floor(rnd() * 9999) });
    x += w + 0.004 + rnd() * 0.012;
  }
  return bs;
}
const SKY_FAR = makeSkyline(123457, 0.05, 0.13);
const SKY_NEAR = makeSkyline(987643, 0.07, 0.2);

/* stars */
const stars = Array.from({ length: 140 }, () => ({
  x: Math.random(), y: Math.random() * 0.4, r: Math.random() * 1.3 + 0.4,
  tw: Math.random() * Math.PI * 2, sp: 0.5 + Math.random() * 1.5,
}));

/* clouds */
const clouds = Array.from({ length: 7 }, (_, i) => ({
  x: Math.random(), y: 0.08 + Math.random() * 0.22, w: 0.12 + Math.random() * 0.2,
  h: 0.02 + Math.random() * 0.025, sp: 0.004 + Math.random() * 0.008,
}));

/* roadside + traffic state */
let dist = 0, speed = 8, swayT = 0;
const props = [];     // { kind:'palm'|'pole'|'sign', x, z, h, txt }
const cars = [];      // { x, z, rel, tail:bool }
let nextPalm = 4, nextPole = 10, nextSign = 30, nextCar = 8, nextOnc = 14;
const SIGNS = ['OCEAN DRIVE', 'VICE', 'FLAMINGO', 'MALIBU CLUB', 'APEX', 'SUNSET MOTEL'];
let signIdx = 0;

let kickPulse = 0, stabPulse = 0, dropFlash = 0, cutFlash = 0, lastSec = -1;

/* film grain tile */
const grainCv = document.createElement('canvas'); grainCv.width = 160; grainCv.height = 160;
(function () {
  const gg = grainCv.getContext('2d');
  const im = gg.createImageData(160, 160);
  for (let i = 0; i < im.data.length; i += 4) {
    const v = 100 + Math.random() * 90;
    im.data[i] = im.data[i + 1] = im.data[i + 2] = v; im.data[i + 3] = 255;
  }
  gg.putImageData(im, 0, 0);
})();

function drainVisuals(now) {
  for (let i = visualQueue.length - 1; i >= 0; i--) {
    const v = visualQueue[i];
    if (v.when <= now) {
      if (v.kind === 'kick') kickPulse = 1;
      else if (v.kind === 'stab') stabPulse = 1;
      else if (v.kind === 'drop') dropFlash = 1;
      visualQueue.splice(i, 1);
    }
  }
}

/* road center x at depth z (gentle s-curves) */
function roadC(z) {
  const sway = Math.sin(swayT * 0.21) * 0.6 + Math.sin(swayT * 0.083) * 0.4;
  return W / 2 + sway * W * 0.16 * Math.pow(Math.min(z / Z_FAR, 1), 1.6);
}
function project(x, z) {
  const F = FOCAL();
  return { x: roadC(z) + (x / z) * F * 0.6, y: HY + (1.5 / z) * F * 0.62, s: F * 0.6 / z };
}

function drawPalmAt(p, hUnits, lean, alpha) {
  const hpx = p.s * hUnits * 0.55;
  if (hpx < 4 || p.x < -W * 0.2 || p.x > W * 1.2) return;
  g.save(); g.globalAlpha = alpha;
  g.translate(p.x, p.y);
  /* curved trunk as a filled tapered polygon */
  const segs = 9, pts = [];
  for (let i = 0; i <= segs; i++) {
    const k = i / segs;
    pts.push([lean * hpx * 0.22 * k * k, -hpx * k, Math.max(0.8, hpx * 0.034 * (1 - k * 0.55))]);
  }
  g.fillStyle = '#180d20';
  g.beginPath();
  g.moveTo(pts[0][0] - pts[0][2], pts[0][1]);
  for (const q of pts) g.lineTo(q[0] - q[2], q[1]);
  for (let i = segs; i >= 0; i--) g.lineTo(pts[i][0] + pts[i][2], pts[i][1]);
  g.closePath(); g.fill();
  const tx = pts[segs][0], ty = pts[segs][1];
  /* fronds: filled tapered quadratic-curve polygons, larger crown */
  g.fillStyle = '#0c1a14';
  for (let i = 0; i < 9; i++) {
    const a = -Math.PI * 0.98 + (i / 8) * Math.PI * 0.96 + lean * 0.12;
    const fl = hpx * (0.42 + (i % 3) * 0.07);
    const sag = fl * (0.28 + 0.12 * Math.abs(Math.sin(i * 2.1)));
    const ex = tx + Math.cos(a) * fl, ey = ty + Math.sin(a) * fl * 0.42 + sag;
    const mx = tx + Math.cos(a) * fl * 0.55, my = ty + Math.sin(a) * fl * 0.36 - fl * 0.16;
    const wh = Math.max(1, fl * 0.11);
    g.beginPath();
    g.moveTo(tx, ty - wh * 0.35);
    g.quadraticCurveTo(mx, my - wh, ex, ey);
    g.quadraticCurveTo(mx, my + wh, tx, ty + wh * 0.35);
    g.closePath(); g.fill();
  }
  /* crown core */
  g.beginPath(); g.arc(tx, ty, Math.max(1.2, hpx * 0.055), 0, 7); g.fill();
  g.restore();
}

const secEl = document.getElementById('section');
const fillEl = document.getElementById('pbFill');

let lastT = performance.now() / 1000;
function draw() {
  requestAnimationFrame(draw);
  const now = ctx ? ctx.currentTime : 0;
  const t = performance.now() / 1000;
  const dt = Math.min(0.08, t - lastT); lastT = t;
  if (playing) drainVisuals(now);
  kickPulse *= 0.9; stabPulse *= 0.85; dropFlash *= 0.93; cutFlash *= 0.85;

  let frac = 0, sec = 0;
  if (playing && ctx) {
    const pos = ((now - startTime) % LOOP_SECONDS + LOOP_SECONDS) % LOOP_SECONDS;
    frac = Math.max(0, pos / LOOP_SECONDS);
    sec = Math.min(5, Math.floor(frac * 6));
    fillEl.style.width = (frac * 100).toFixed(1) + '%';
    secEl.textContent = SECTION_NAMES[sec];
    if (sec !== lastSec) { if (lastSec !== -1) cutFlash = 0.7; lastSec = sec; }
  }
  const pal = palette(frac);
  /* pre-climax visual ramp across 'the build' (sec 3): 0 -> 1 over bars 24-31 */
  const buildK = sec === 3 ? Math.min(1, Math.max(0, frac * 6 - 3)) : 0;
  const targetSpeed = sec === 3 ? 15 + buildK * 5.5 : [7, 12, 14, 16, 22, 15][sec] || 7;
  speed += (targetSpeed - speed) * dt * 1.2;
  const spd = speed * (1 + kickPulse * 0.05);
  dist += spd * dt;
  swayT += dt * (0.6 + spd * 0.02);

  /* spawn world */
  while (dist > nextPalm) { props.push({ kind: 'palm', x: (Math.random() < 0.7 ? -1 : 1) * (4.5 + Math.random() * 2.5), z: Z_FAR, h: 5 + Math.random() * 2.5, lean: Math.random() * 1.6 - 0.8 }); nextPalm += 3.5 + Math.random() * 2; }
  while (dist > nextPole) { props.push({ kind: 'pole', x: -3.9, z: Z_FAR, h: 4.4 }); nextPole += 9; }
  while (dist > nextSign) { props.push({ kind: 'sign', x: 5.6, z: Z_FAR, h: 4.6, txt: SIGNS[signIdx++ % SIGNS.length] }); nextSign += 38 + Math.random() * 20; }
  if (!playing) { nextCar = Math.max(nextCar, dist + 4); nextOnc = Math.max(nextOnc, dist + 6); } // keep the title frame clear of near-field traffic
  while (dist > nextCar) { const lane = Math.random() < 0.5 ? -1 : 1; cars.push({ x: lane * (1.0 + Math.random() * 0.25), lane, z: Z_FAR, rel: spd * (0.25 + Math.random() * 0.2), tail: true }); nextCar += 13 + Math.random() * 10; }
  while (dist > nextOnc) { cars.push({ x: -2.7 + Math.random() * 0.25, lane: 9, z: Z_FAR, rel: spd * 1.8, tail: false }); nextOnc += 16 + Math.random() * 14; }

  for (const p of props) p.z -= spd * dt;
  for (const c of cars) c.z -= c.rel * dt;
  /* car-following: enforce a min z-gap per lane so cars never interpenetrate */
  cars.sort((a, b2) => a.z - b2.z);
  const lastInLane = {};
  for (const c of cars) {
    const ahead = lastInLane[c.lane];
    if (ahead && c.z - ahead.z < 2.6) { c.z = ahead.z + 2.6; c.rel = Math.min(c.rel, ahead.rel); }
    lastInLane[c.lane] = c;
  }
  for (let i = props.length - 1; i >= 0; i--) if (props[i].z < 0.55) props.splice(i, 1);
  for (let i = cars.length - 1; i >= 0; i--) if (cars[i].z < 0.55) cars.splice(i, 1);

  /* camera shake + zoom pulse at climax */
  g.save();
  if (sec === 4) {
    const zm = 1 + kickPulse * 0.02;
    g.translate(W / 2, H / 2); g.scale(zm, zm); g.translate(-W / 2, -H / 2);
    g.translate((Math.random() - 0.5) * kickPulse * 22 * devicePixelRatio, (Math.random() - 0.5) * kickPulse * 14 * devicePixelRatio);
  }

  /* ---- sky ---- */
  const sky = g.createLinearGradient(0, 0, 0, HY);
  sky.addColorStop(0, rgb(pal.top));
  sky.addColorStop(0.6, rgb(pal.mid));
  sky.addColorStop(1, rgb(pal.hor));
  g.fillStyle = sky; g.fillRect(0, 0, W, HY + 2);

  /* stars (night) */
  if (pal.night > 0.05) {
    g.save();
    for (const s of stars) {
      g.globalAlpha = pal.night * (0.3 + 0.5 * Math.abs(Math.sin(s.tw + t * s.sp)));
      g.fillStyle = '#ffeef8';
      g.beginPath(); g.arc(s.x * W, s.y * H, s.r * devicePixelRatio, 0, 7); g.fill();
    }
    g.restore();
  }

  /* moon (rises as night falls; the ocean reuses these for its glitter path) */
  const moonA = Math.max(0, (pal.night - 0.45) / 0.55);
  const moonX = W * 0.74, moonY = H * 0.16;
  if (moonA > 0.02) {
    g.save(); g.globalCompositeOperation = 'lighter';
    const mg = g.createRadialGradient(moonX, moonY, 0, moonX, moonY, H * 0.11);
    mg.addColorStop(0, `rgba(220,232,255,${0.5 * moonA})`);
    mg.addColorStop(0.25, `rgba(185,205,255,${0.16 * moonA})`);
    mg.addColorStop(1, 'rgba(185,205,255,0)');
    g.fillStyle = mg; g.beginPath(); g.arc(moonX, moonY, H * 0.11, 0, 7); g.fill();
    g.restore();
    g.fillStyle = `rgba(236,242,255,${0.92 * moonA})`;
    g.beginPath(); g.arc(moonX, moonY, H * 0.026, 0, 7); g.fill();
    g.fillStyle = `rgba(150,160,205,${0.3 * moonA})`;
    g.beginPath(); g.arc(moonX - H * 0.007, moonY + H * 0.005, H * 0.009, 0, 7); g.fill();
  }

  /* sun + flare */
  const sunVis = pal.sun > -0.05;
  const sunX = W * 0.62, sunY = HY - pal.sun * H * 0.32;
  if (sunVis) {
    const sr = Math.min(W, H) * 0.085;
    const glow = g.createRadialGradient(sunX, sunY, sr * 0.2, sunX, sunY, sr * 5);
    glow.addColorStop(0, 'rgba(255,200,120,0.55)');
    glow.addColorStop(0.4, 'rgba(255,120,90,0.16)');
    glow.addColorStop(1, 'rgba(255,120,90,0)');
    g.fillStyle = glow; g.fillRect(sunX - sr * 5, sunY - sr * 5, sr * 10, sr * 10);
    const sg = g.createRadialGradient(sunX, sunY - sr * 0.3, sr * 0.1, sunX, sunY, sr);
    sg.addColorStop(0, '#fff7d8'); sg.addColorStop(0.7, '#ffd34d'); sg.addColorStop(1, '#ff7a4d');
    g.save(); g.beginPath();
    g.arc(sunX, sunY, sr, 0, Math.PI, true);   // clip sun below horizon line naturally
    g.rect(sunX - sr, sunY, sr * 2, Math.max(0, HY - sunY));
    g.clip();
    g.fillStyle = sg; g.beginPath(); g.arc(sunX, sunY, sr, 0, 7); g.fill();
    g.restore();
    // anamorphic streak + flare dots toward screen center
    g.save(); g.globalCompositeOperation = 'lighter';
    const st = g.createLinearGradient(sunX - sr * 4, sunY, sunX + sr * 4, sunY);
    st.addColorStop(0, 'rgba(110,200,255,0)'); st.addColorStop(0.5, 'rgba(160,220,255,0.25)'); st.addColorStop(1, 'rgba(110,200,255,0)');
    g.fillStyle = st; g.fillRect(sunX - sr * 4, sunY - 1.5 * devicePixelRatio, sr * 8, 3 * devicePixelRatio);
    for (let i = 1; i <= 4; i++) {
      const fx = sunX + (W / 2 - sunX) * i * 0.45, fy = sunY + (H / 2 - sunY) * i * 0.45;
      g.fillStyle = `hsla(${180 + i * 35}, 90%, 70%, ${0.1 - i * 0.015})`;
      g.beginPath(); g.arc(fx, fy, (5 - i) * 6 * devicePixelRatio, 0, 7); g.fill();
    }
    g.restore();
  }

  /* clouds */
  g.save();
  for (const c of clouds) {
    c.x -= c.sp * dt;
    if (c.x < -0.3) c.x = 1.3;
    const cx2 = c.x * W, cy2 = c.y * H;
    const cg = g.createRadialGradient(cx2, cy2, 0, cx2, cy2, c.w * W);
    const tint = pal.night > 0.5 ? 'rgba(40,30,70,' : 'rgba(190,90,120,';
    cg.addColorStop(0, tint + (0.22 * (1 - pal.night * 0.5)) + ')');
    cg.addColorStop(0.55, tint + (0.1 * (1 - pal.night * 0.5)) + ')');
    cg.addColorStop(1, tint + '0)');
    g.fillStyle = cg;
    g.save(); g.translate(cx2, cy2); g.scale(1, c.h / c.w);
    g.beginPath(); g.arc(0, 0, c.w * W, 0, 7); g.fill();
    // sunlit underside rim, fades away at night
    if (pal.night < 0.7) {
      const rg3 = g.createRadialGradient(0, c.w * W * 0.18, 0, 0, c.w * W * 0.18, c.w * W * 0.8);
      rg3.addColorStop(0, `rgba(255,160,90,${0.18 * (1 - pal.night)})`);
      rg3.addColorStop(1, 'rgba(255,160,90,0)');
      g.fillStyle = rg3;
      g.beginPath(); g.arc(0, c.w * W * 0.18, c.w * W * 0.8, 0, 7); g.fill();
    }
    g.restore();
  }
  g.restore();

  /* skyline (left city), two parallax strips */
  const neonBoost = sec === 4 ? 1.55 : 1 + buildK * 0.35;
  const drawSky = (strip, par, hMul, col) => {
    g.fillStyle = col;
    for (const b of strip) {
      let bx = ((b.x - dist * par * 0.004) % 2.2 + 2.2) % 2.2 - 0.4;
      if (bx > 1.1) continue;
      const x = bx * W, bw = b.w * W, bh = b.h * H * hMul;
      g.fillRect(x, HY - bh, bw, bh + 2);
      {
        // lit windows: sparse at dusk, dense at night
        const lit = 0.25 + 0.75 * pal.night;
        let s = b.win;
        const rnd = () => { s = (s * 16807) % 2147483647; return s / 2147483647; };
        g.save(); g.fillStyle = `rgba(255,220,140,${Math.min(0.95, 0.55 * lit * neonBoost)})`;
        const cols = Math.max(1, Math.floor(bw / (6 * devicePixelRatio)));
        const rows = Math.max(1, Math.floor(bh / (9 * devicePixelRatio)));
        const dens = 0.32 * (0.35 + 0.65 * pal.night);
        for (let wy = 0; wy < rows; wy++) for (let wx = 0; wx < cols; wx++)
          if (rnd() < dens) g.fillRect(x + 2 + wx * bw / cols, HY - bh + 3 + wy * bh / rows, 2 * devicePixelRatio, 3 * devicePixelRatio);
        g.restore();
        // neon roof edge (faint at dusk, blooms hard at the climax)
        const hue2 = (b.win % 2) ? '255,46,136' : '110,243,255';
        g.save();
        if (neonBoost > 1) {
          g.strokeStyle = `rgba(${hue2},${0.3 * lit})`;
          g.lineWidth = 6 * devicePixelRatio;
          g.beginPath(); g.moveTo(x, HY - bh); g.lineTo(x + bw, HY - bh); g.stroke();
        }
        g.strokeStyle = `rgba(${hue2},${Math.min(1, 0.7 * lit * neonBoost)})`;
        g.lineWidth = (neonBoost > 1 ? 2.4 : 1.5) * devicePixelRatio;
        g.beginPath(); g.moveTo(x, HY - bh); g.lineTo(x + bw, HY - bh); g.stroke();
        g.restore();
      }
    }
  };
  drawSky(SKY_FAR, 0.18, 0.8, rgba(pal.mid.map(v => Math.max(0, v - 26)), 1));
  drawSky(SKY_NEAR, 0.45, 1.0, rgba(pal.top.map(v => Math.max(0, v + 2)), 1));

  /* ---- ocean (right of road) ---- */
  g.save();
  g.beginPath();
  g.moveTo(W + 4, HY);
  const F = FOCAL();
  for (let i = 0; i <= 26; i++) {
    const z = Z_FAR - (Z_FAR - 0.7) * (i / 26);
    const p = project(4.4, z);
    g.lineTo(p.x, p.y);
  }
  g.lineTo(W + 4, H); g.closePath();
  const og = g.createLinearGradient(0, HY, 0, H);
  og.addColorStop(0, rgba(pal.hor.map(v => Math.round(v * 0.55)), 1));
  og.addColorStop(0.35, `rgb(${10 + pal.night * 4},${30 - pal.night * 16},${66 - pal.night * 28})`);
  og.addColorStop(1, `rgb(4,${14 - pal.night * 8},${34 - pal.night * 18})`);
  g.fillStyle = og; g.fill();
  // sun glitter path on water
  g.clip();
  g.globalCompositeOperation = 'lighter';
  if (sunVis) {
    // glitter intensity follows sun altitude
    const glA = Math.min(1, Math.max(0, (pal.sun + 0.05) / 0.18));
    // warm specular column widening toward the camera
    const colG = g.createLinearGradient(0, HY, 0, H);
    colG.addColorStop(0, `rgba(255,175,95,${0.30 * glA})`);
    colG.addColorStop(0.45, `rgba(255,140,80,${0.10 * glA})`);
    colG.addColorStop(1, 'rgba(255,140,80,0)');
    g.fillStyle = colG;
    g.beginPath();
    g.moveTo(sunX - 9 * devicePixelRatio, HY);
    g.lineTo(sunX + 9 * devicePixelRatio, HY);
    g.lineTo(sunX + W * 0.10, H);
    g.lineTo(sunX - W * 0.10, H);
    g.closePath(); g.fill();
    // animated horizontal specular dashes (same technique as the night reflections)
    for (let i = 0; i < 46; i++) {
      const yy = HY + Math.pow(i / 46, 1.7) * (H - HY);
      const sw = (6 + i * 3.1) * devicePixelRatio;
      const xx = sunX + (Math.sin(i * 3.7 + t * 2.2) * sw * 0.55);
      g.fillStyle = `rgba(255,205,125,${(0.36 * (1 - i / 60)) * glA * (0.4 + 0.6 * (Math.sin(i * 9 + t * 4) * 0.5 + 0.5))})`;
      g.fillRect(xx - sw / 2, yy, sw, (1.5 + i * 0.045) * devicePixelRatio);
    }
  } else {
    // moonlight glitter path keeps the coast alive at night
    if (moonA > 0.02) {
      for (let i = 0; i < 40; i++) {
        const yy = HY + Math.pow(i / 40, 1.7) * (H - HY);
        const sw = (5 + i * 2.4) * devicePixelRatio;
        const xx = moonX + Math.sin(i * 3.1 + t * 1.8) * sw * 0.5;
        g.fillStyle = `rgba(195,218,255,${0.16 * moonA * (1 - i / 40) * (Math.sin(i * 7 + t * 3.4) * 0.5 + 0.5)})`;
        g.fillRect(xx - sw / 2, yy, sw, 1.6 * devicePixelRatio);
      }
    }
    // neon city reflections
    for (let i = 0; i < 30; i++) {
      const yy = HY + Math.pow(i / 30, 1.6) * (H - HY) * 0.7;
      const xx = W * (0.7 + Math.sin(i * 5.3) * 0.12);
      g.fillStyle = `rgba(${i % 2 ? '255,46,136' : '110,243,255'},${0.13 * (1 - i / 30) * pal.night})`;
      g.fillRect(xx, yy, (30 + i * 3) * devicePixelRatio, 1.4 * devicePixelRatio);
    }
    // horizontal wave shimmer strokes
    for (let i = 0; i < 22; i++) {
      const yy = HY + Math.pow((i + 0.5) / 22, 1.5) * (H - HY);
      const ww = (40 + i * 14) * devicePixelRatio;
      const xx = W * 0.45 + ((Math.sin(i * 13.7) * 0.5 + 0.5) * W * 0.6) + Math.sin(t * 1.3 + i * 2.2) * 9 * devicePixelRatio;
      g.fillStyle = `rgba(150,190,235,${0.06 * pal.night * (0.35 + 0.65 * Math.abs(Math.sin(i * 5 + t * 2)))})`;
      g.fillRect(xx - ww / 2, yy, ww, 1.2 * devicePixelRatio);
    }
  }
  g.restore();

  /* ---- terrain left of road ---- */
  g.save();
  g.beginPath();
  g.moveTo(-4, HY);
  for (let i = 0; i <= 26; i++) {
    const z = Z_FAR - (Z_FAR - 0.7) * (i / 26);
    const p = project(-4.4, z);
    g.lineTo(p.x, p.y);
  }
  g.lineTo(-4, H); g.closePath();
  // gradient: faint horizon warmth fading to dark sand/scrub near the camera
  const tg = g.createLinearGradient(0, HY, 0, H);
  tg.addColorStop(0, `rgb(${Math.round(20 + pal.hor[0] * 0.10)},${Math.round(15 + pal.hor[1] * 0.07)},${Math.round(28 + pal.hor[2] * 0.05)})`);
  tg.addColorStop(0.4, `rgb(${19 - Math.round(pal.night * 5)},${15 - Math.round(pal.night * 4)},${28 - Math.round(pal.night * 8)})`);
  tg.addColorStop(1, `rgb(${13 - Math.round(pal.night * 4)},${11 - Math.round(pal.night * 3)},${21 - Math.round(pal.night * 6)})`);
  g.fillStyle = tg;
  g.fill();
  g.clip();
  // sand / grass tonal patches sweeping past with the road
  for (let m = 0; m < 16; m++) {
    const z = (2.1 - dist % 2.1) % 2.1 + m * 2.1 + 0.9;
    if (z > 34) continue;
    const id = Math.round((dist + z) / 2.1);
    const h1 = ((id * 2654435761) >>> 0) / 4294967296;
    const h2 = ((id * 1597334677) >>> 0) / 4294967296;
    const p = project(-5.4 - h1 * 5, z);
    const pw = p.s * (0.8 + h2 * 1.7), ph = Math.max(1.5, pw * 0.2);
    g.fillStyle = h2 > 0.5
      ? `rgba(${96 + Math.round(pal.hor[0] * 0.14)},66,78,0.11)`
      : 'rgba(46,76,66,0.11)';
    g.beginPath(); g.ellipse(p.x, p.y, pw, ph, 0, 0, 7); g.fill();
  }
  g.restore();

  /* shoulder detail so the left wedge reads as terrain: guardrail + posts + scrub */
  g.save();
  g.strokeStyle = `rgba(${150 + Math.round(pal.hor[0] * 0.12)},135,175,0.32)`;
  g.lineWidth = 2 * devicePixelRatio;
  g.beginPath();
  for (let i = 0; i <= 18; i++) {
    const z = 0.8 + 25 * Math.pow(i / 18, 2);
    const p = project(-4.6, z);
    const y = p.y - p.s * 0.5 * 0.55;
    i ? g.lineTo(p.x, y) : g.moveTo(p.x, y);
  }
  g.stroke();
  g.strokeStyle = 'rgba(120,110,150,0.28)';
  g.lineWidth = 1.5 * devicePixelRatio;
  for (let m = 0; m < 9; m++) {
    const z = (3.2 - dist % 3.2) % 3.2 + m * 3.2 + 0.8;
    if (z > 26) continue;
    const p = project(-4.6, z);
    if (p.x < W * 0.02 || p.x > W * 0.97) continue;
    g.beginPath(); g.moveTo(p.x, p.y); g.lineTo(p.x, p.y - p.s * 0.5 * 0.55); g.stroke();
  }
  g.fillStyle = `rgba(${64 + Math.round(pal.hor[0] * 0.08)},56,92,0.55)`;
  for (let m = 0; m < 24; m++) {
    const z = (1.3 - dist % 1.3) % 1.3 + m * 1.3 + 0.9;
    if (z > 30) continue;
    const sx = -5.2 - ((m * 7919) % 23) / 23 * 2.4;
    const p = project(sx, z);
    if (p.x < W * 0.02 || p.x > W * 0.97) continue;   // cull at frame edges
    const r = Math.max(0.8, p.s * 0.022);
    g.beginPath();
    g.ellipse(p.x + r * 1.2, Math.max(p.y - r * 0.5, HY + 2 * devicePixelRatio), r * 1.4, r * 0.7, 0, 0, 7);
    g.fill();
  }
  g.restore();

  /* ---- road ---- */
  const ROWS = 56;
  for (let i = 0; i < ROWS; i++) {
    const k0 = i / ROWS, k1 = (i + 1) / ROWS;
    const z0 = 0.7 + (Z_FAR - 0.7) * Math.pow(1 - k0, 2.4);
    const z1 = 0.7 + (Z_FAR - 0.7) * Math.pow(1 - k1, 2.4);
    const pa = project(-4.4, z0), pb = project(4.4, z0);
    const pc = project(4.4, z1), pd = project(-4.4, z1);
    const shade = 16 + (1 - z0 / Z_FAR) * 14;
    g.fillStyle = `rgb(${shade},${shade - 2},${shade + 6})`;
    g.beginPath(); g.moveTo(pa.x, pa.y); g.lineTo(pb.x, pb.y); g.lineTo(pc.x, pc.y); g.lineTo(pd.x, pd.y); g.closePath(); g.fill();
    // wet sheen reflecting the sky near the horizon
    g.fillStyle = rgba(pal.hor, 0.05 * (z0 / Z_FAR));
    g.fill();
  }
  // lane markings
  g.save();
  for (let i = 0; i < ROWS; i++) {
    const k = i / ROWS;
    const z = 0.7 + (Z_FAR - 0.7) * Math.pow(1 - k, 2.4);
    const seg = (dist + z) % 7;
    if (seg < 2.6) {
      const p = project(0, z);
      const w = Math.max(1, (0.12 / z) * F * 0.6);
      g.fillStyle = `rgba(255,235,170,${0.5 + 0.2 * (1 - z / Z_FAR)})`;
      g.fillRect(p.x - w / 2, p.y, w, Math.max(1.2, (0.5 / z) * F * 0.18));
    }
  }
  // solid white edge lines along both shoulders — continuous tapered ribbons
  for (const ex of [-4.15, 4.15]) {
    const left = [], right = [];
    for (let i = 0; i <= 30; i++) {
      const z = 0.7 + (Z_FAR - 0.7) * Math.pow(1 - i / 30, 2.4);
      const p = project(ex, z);
      const w = Math.max(1, (0.09 / z) * F * 0.6);
      left.push([p.x - w / 2, p.y]); right.push([p.x + w / 2, p.y]);
    }
    g.beginPath();
    left.forEach(([x, y], i) => i ? g.lineTo(x, y) : g.moveTo(x, y));
    for (let i = right.length - 1; i >= 0; i--) g.lineTo(right[i][0], right[i][1]);
    g.closePath();
    g.fillStyle = 'rgba(235,235,245,0.3)';
    g.fill();
  }
  // roadside reflector posts: short stems with emissive heads, spaced every 7 units
  for (const ex of [-3.9, 3.9]) {
    const col = ex < 0 ? '255,236,200' : '255,72,84';
    for (let m = 0; m < 6; m++) {
      const z = (7 - (dist + (ex > 0 ? 3.5 : 0)) % 7) % 7 + m * 7 + 0.85;
      if (z > Z_FAR - 2) continue;
      const p = project(ex, z);
      if (p.x < W * 0.03 || p.x > W * 0.97) continue;   // cull at frame edges
      const hpx = Math.min(22 * devicePixelRatio, p.s * 0.6 * 0.55);
      if (hpx < 1.5) continue;
      const fade = Math.min(1, (z - 0.7) / 2.2);   // fade out as posts reach the camera
      if (hpx > 4 * devicePixelRatio) {            // stem only when tall enough to read as a post
        g.fillStyle = `rgba(28,24,44,${0.85 * fade})`;
        g.fillRect(p.x - hpx * 0.08, p.y - hpx, hpx * 0.16, hpx);
      }
      const rr = Math.max(1, hpx * 0.16);
      g.save(); g.globalCompositeOperation = 'lighter';
      const rg2 = g.createRadialGradient(p.x, p.y - hpx, 0, p.x, p.y - hpx, rr * 3);
      rg2.addColorStop(0, `rgba(${col},${0.9 * fade})`);
      rg2.addColorStop(0.4, `rgba(${col},${0.25 * fade})`);
      rg2.addColorStop(1, `rgba(${col},0)`);
      g.fillStyle = rg2; g.beginPath(); g.arc(p.x, p.y - hpx, rr * 3, 0, 7); g.fill();
      g.restore();
    }
  }
  g.restore();

  /* ---- props & cars, far to near ---- */
  const drawables = [];
  for (const p of props) drawables.push(p);
  for (const c of cars) drawables.push(c);
  drawables.sort((a, b2) => b2.z - a.z);
  for (const d of drawables) {
    if (d.kind === 'palm') {
      drawPalmAt(project(d.x, d.z), d.h, d.lean, Math.min(1, (Z_FAR - d.z) / 6));
    } else if (d.kind === 'pole') {
      const p = project(d.x, d.z);
      const hpx = p.s * d.h * 0.55;
      if (hpx < 4) continue;
      // pole gets a faint rim at night so the lamp glow stays anchored to it
      const rim = Math.round(10 + pal.night * 62);
      g.strokeStyle = `rgb(${rim},${rim - 3},${rim + 20})`; g.lineWidth = Math.max(1, hpx * 0.03);
      g.beginPath(); g.moveTo(p.x, p.y); g.lineTo(p.x, p.y - hpx); g.lineTo(p.x + hpx * 0.3, p.y - hpx); g.stroke();
      // lamp head + glow
      g.save(); g.globalCompositeOperation = 'lighter';
      const lx = p.x + hpx * 0.3, ly = p.y - hpx;
      g.fillStyle = `rgba(255,240,200,${0.5 + pal.night * 0.5})`;
      g.fillRect(lx - hpx * 0.04, ly - hpx * 0.02, hpx * 0.08, hpx * 0.04);
      const lg2 = g.createRadialGradient(lx, ly, 0, lx, ly, hpx * 0.3);
      const lit = 0.25 + pal.night * 0.6;
      lg2.addColorStop(0, `rgba(255,230,170,${lit})`); lg2.addColorStop(1, 'rgba(255,230,170,0)');
      g.fillStyle = lg2; g.beginPath(); g.arc(lx, ly, hpx * 0.3, 0, 7); g.fill();
      // light pool spilling across the shoulder and road edge
      const pr = hpx * 0.95;
      const pg2 = g.createRadialGradient(lx, p.y, 0, lx, p.y, pr);
      pg2.addColorStop(0, `rgba(255,224,160,${0.07 + pal.night * 0.13})`);
      pg2.addColorStop(1, 'rgba(255,224,160,0)');
      g.fillStyle = pg2;
      g.save(); g.translate(lx, p.y); g.scale(1, 0.28);
      g.beginPath(); g.arc(0, 0, pr, 0, 7); g.fill();
      g.restore();
      g.restore();
    } else if (d.kind === 'sign') {
      const p = project(d.x, d.z);
      const hpx = p.s * d.h * 0.55;
      if (hpx < 6) continue;
      // fade out before the board can sweep across the HUD, fade the neon in
      // only once the text is legible — never show a lit empty face
      const nearFade = Math.min(1, Math.max(0, (d.z - 1.4) / 2.0));
      if (nearFade <= 0.04) continue;
      const bw = hpx * 2.6, bh = hpx * 0.7;
      const legible = Math.min(1, Math.max(0, (bh / devicePixelRatio - 14) / 8));
      g.save(); g.globalAlpha = nearFade;
      g.fillStyle = '#0c0818';
      g.fillRect(p.x - bw / 2, p.y - hpx - bh, bw, bh);
      g.fillRect(p.x - hpx * 0.04, p.y - hpx, hpx * 0.08, hpx);
      if (legible > 0) {
        const hue = d.txt.length % 2 ? '255,46,136' : '110,243,255';
        // build section: billboards strobe on the kick as a pre-climax cue
        const strobe = buildK > 0 ? Math.min(1, 1 - buildK * 0.5 + kickPulse * buildK * 0.9) : 1;
        g.globalAlpha = nearFade * legible;
        g.globalCompositeOperation = 'lighter';
        g.strokeStyle = `rgba(${hue},${0.9 * strobe})`; g.lineWidth = Math.max(1, hpx * 0.02);
        g.strokeRect(p.x - bw / 2, p.y - hpx - bh, bw, bh);
        g.font = `bold ${bh * 0.46}px 'Courier New', monospace`;
        g.textAlign = 'center'; g.textBaseline = 'middle';
        g.shadowColor = `rgb(${hue})`; g.shadowBlur = 12 * devicePixelRatio;
        g.fillStyle = `rgba(${hue},${Math.min(1, (0.85 + stabPulse * 0.15) * strobe)})`;
        g.fillText(d.txt, p.x, p.y - hpx - bh / 2);
        g.shadowBlur = 4 * devicePixelRatio;
        g.fillStyle = `rgba(255,255,255,${0.75 + stabPulse * 0.2})`;
        g.fillText(d.txt, p.x, p.y - hpx - bh / 2);
      }
      g.restore();
    } else {
      // cars: real body silhouettes near/mid, pure bokeh dots only in the far field
      const p = project(d.x, d.z);
      const cw = p.s * 1.35;                       // car width in px
      const hasBody = cw > 14 * devicePixelRatio;
      const bh2 = cw * 0.30, rw = cw * 0.62, rh = cw * 0.24;
      const ly2 = hasBody ? p.y - bh2 * 0.5 : p.y;  // light height
      if (hasBody) {
        // soft ground shadow anchoring the car to the road
        g.fillStyle = 'rgba(0,0,6,0.42)';
        g.beginPath(); g.ellipse(p.x, p.y + cw * 0.025, cw * 0.56, Math.max(1.5, cw * 0.07), 0, 0, 7); g.fill();
        // lower body (trapezoid) + darker cabin with a roofline
        g.fillStyle = d.tail ? '#0e0a1a' : '#0a0816';
        g.beginPath();
        g.moveTo(p.x - cw / 2, p.y);
        g.lineTo(p.x + cw / 2, p.y);
        g.lineTo(p.x + cw * 0.45, p.y - bh2);
        g.lineTo(p.x - cw * 0.45, p.y - bh2);
        g.closePath(); g.fill();
        // shoulder line catching ambient light, separating body from cabin
        g.strokeStyle = pal.night > 0.5 ? 'rgba(125,155,215,0.28)' : 'rgba(255,165,115,0.28)';
        g.lineWidth = Math.max(1, cw * 0.012);
        g.beginPath(); g.moveTo(p.x - cw * 0.45, p.y - bh2); g.lineTo(p.x + cw * 0.45, p.y - bh2); g.stroke();
        g.fillStyle = d.tail ? '#090614' : '#06050e';
        g.beginPath();
        g.moveTo(p.x - rw / 2, p.y - bh2 + 1);
        g.lineTo(p.x + rw / 2, p.y - bh2 + 1);
        g.lineTo(p.x + rw * 0.31, p.y - bh2 - rh);
        g.lineTo(p.x - rw * 0.31, p.y - bh2 - rh);
        g.closePath(); g.fill();
        // roof highlight catching the sky
        g.strokeStyle = rgba(pal.hor, 0.35);
        g.lineWidth = Math.max(1, cw * 0.012);
        g.beginPath(); g.moveTo(p.x - rw * 0.31, p.y - bh2 - rh); g.lineTo(p.x + rw * 0.31, p.y - bh2 - rh); g.stroke();
        // rear-window / windshield glint
        g.fillStyle = d.tail
          ? `rgba(${pal.night > 0.5 ? '150,180,235' : '255,170,120'},0.22)`
          : 'rgba(140,160,210,0.16)';
        g.beginPath();
        g.moveTo(p.x - rw * 0.42, p.y - bh2 - rh * 0.1);
        g.lineTo(p.x + rw * 0.42, p.y - bh2 - rh * 0.1);
        g.lineTo(p.x + rw * 0.27, p.y - bh2 - rh * 0.86);
        g.lineTo(p.x - rw * 0.27, p.y - bh2 - rh * 0.86);
        g.closePath(); g.fill();
      }
      const sep = Math.max(2, p.s * (hasBody ? 0.92 : 0.5)), r = Math.max(1.5, p.s * (hasBody ? 0.09 : 0.13)) * neonBoost;
      g.save(); g.globalCompositeOperation = 'lighter';
      const col = d.tail ? '255,40,60' : '255,235,190';
      for (const o of [-sep / 2, sep / 2]) {
        const lg3 = g.createRadialGradient(p.x + o, ly2, 0, p.x + o, ly2, r * (hasBody ? 3 : 4));
        lg3.addColorStop(0, `rgba(${col},0.95)`); lg3.addColorStop(0.35, `rgba(${col},0.35)`); lg3.addColorStop(1, `rgba(${col},0)`);
        g.fillStyle = lg3; g.beginPath(); g.arc(p.x + o, ly2, r * (hasBody ? 3 : 4), 0, 7); g.fill();
        g.fillStyle = `rgba(255,255,255,0.9)`;
        g.beginPath(); g.arc(p.x + o, ly2, r * 0.6, 0, 7); g.fill();
      }
      if (hasBody && d.tail) {
        // license-plate glow between the tail lights
        const pw3 = cw * 0.15, ph3 = pw3 * 0.42;
        g.fillStyle = 'rgba(255,242,205,0.55)';
        g.fillRect(p.x - pw3 / 2, ly2 - ph3 / 2, pw3, ph3);
        const plg = g.createRadialGradient(p.x, ly2, 0, p.x, ly2, pw3 * 1.4);
        plg.addColorStop(0, 'rgba(255,242,205,0.28)'); plg.addColorStop(1, 'rgba(255,242,205,0)');
        g.fillStyle = plg; g.beginPath(); g.arc(p.x, ly2, pw3 * 1.4, 0, 7); g.fill();
      }
      g.restore();
    }
  }

  /* speed lines at high speed (dense + hot at the climax) */
  if (spd > 16 || sec === 4 || buildK > 0.04) {
    g.save(); g.globalCompositeOperation = 'lighter';
    const n = Math.max(0, Math.floor((spd - 16) * 3)) + (sec === 4 ? 60 : Math.floor(buildK * 24));
    const cx2 = roadC(Z_FAR), cy2 = HY;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      // bias density toward the frame edges so motion radiates from the vanishing point
      const r1 = H * (0.22 + Math.pow(Math.random(), 0.6) * 0.34), r2 = r1 + H * (0.1 + Math.random() * 0.25);
      const edge = Math.min(1, Math.max(0, (r1 / H - 0.24) / 0.2));
      const up = Math.sin(a) < 0 ? 0.5 : 1;        // keep the sky / moon readable
      g.strokeStyle = `rgba(255,255,255,${(0.05 + Math.random() * 0.06 + (sec === 4 ? 0.08 + kickPulse * 0.06 : 0)) * (0.25 + 0.75 * edge) * up})`;
      g.lineWidth = (sec === 4 ? 2.2 : 1.5) * devicePixelRatio;
      g.beginPath();
      g.moveTo(cx2 + Math.cos(a) * r1, cy2 + Math.sin(a) * r1 * 0.6);
      g.lineTo(cx2 + Math.cos(a) * r2, cy2 + Math.sin(a) * r2 * 0.6);
      g.stroke();
    }
    g.restore();
  }

  /* climax: anamorphic lens flare across the horizon + kick-synced neon wash */
  if (sec === 4) {
    g.save(); g.globalCompositeOperation = 'lighter';
    const fy = HY - 2 * devicePixelRatio;
    const amp = 0.55 + kickPulse * 0.55 + stabPulse * 0.25;
    const fl = g.createLinearGradient(0, fy, W, fy);
    fl.addColorStop(0, 'rgba(110,243,255,0)');
    fl.addColorStop(0.42, `rgba(160,230,255,${0.12 * amp})`);
    fl.addColorStop(0.5, `rgba(255,255,255,${0.34 * amp})`);
    fl.addColorStop(0.58, `rgba(255,130,200,${0.12 * amp})`);
    fl.addColorStop(1, 'rgba(255,46,136,0)');
    g.fillStyle = fl;
    g.fillRect(0, fy - 2.5 * devicePixelRatio, W, 5 * devicePixelRatio);
    g.fillRect(0, fy - 13 * devicePixelRatio, W, 26 * devicePixelRatio);
    const cgx = roadC(Z_FAR);
    const cg3 = g.createRadialGradient(cgx, fy, 0, cgx, fy, H * 0.32);
    cg3.addColorStop(0, `rgba(255,180,230,${0.2 + kickPulse * 0.25})`);
    cg3.addColorStop(1, 'rgba(255,46,136,0)');
    g.fillStyle = cg3; g.beginPath(); g.arc(cgx, fy, H * 0.32, 0, 7); g.fill();
    g.fillStyle = `rgba(255,70,160,${0.045 + kickPulse * 0.08})`;
    g.fillRect(0, 0, W, H);
    g.restore();
  }

  g.restore();   // camera shake

  /* title screen: dim the world so the UI sits on a composed hero frame */
  if (!playing) {
    g.fillStyle = 'rgba(7,4,18,0.62)';
    g.fillRect(0, 0, W, H);
  }

  /* flashes: section cut + sub drop */
  if (cutFlash > 0.02) { g.fillStyle = `rgba(255,255,255,${cutFlash * 0.18})`; g.fillRect(0, 0, W, H); }
  if (dropFlash > 0.02) { g.fillStyle = `rgba(255,120,180,${dropFlash * 0.12})`; g.fillRect(0, 0, W, H); }

  /* film grain */
  g.save();
  g.globalAlpha = 0.07;
  g.globalCompositeOperation = 'overlay';
  const pat = g.createPattern(grainCv, 'repeat');
  g.translate(Math.random() * 160, Math.random() * 160);
  g.fillStyle = pat;
  g.fillRect(-160, -160, W + 320, H + 320);
  g.restore();

  /* vignette */
  const vg = g.createRadialGradient(W / 2, H * 0.5, H * 0.35, W / 2, H * 0.5, H * 1.05);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,5,0.5)');
  g.fillStyle = vg; g.fillRect(0, 0, W, H);
}
draw();
</script>
</body>
